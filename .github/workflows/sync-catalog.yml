# Regenerates the <!-- catalog:begin --> block in README.md from every
# cataloged repo's .github/kaelys-catalog.json. Runs on a daily cron, on
# manual dispatch, and on `repository_dispatch: catalog-updated` events sent
# by each target repo's catalog-notify.yml when its catalog file changes.
#
# AUTH: mints a short-lived GitHub App installation token per run via
# actions/create-github-app-token. No long-lived PAT lives in secrets. See
# docs/catalog-setup.md for the one-time App setup (client id + private key).
name: sync-catalog

"on":
  schedule:
    # 06:00 UTC daily — an hour after most upstream repos' overnight CI wraps.
    - cron: "0 6 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [catalog-updated]

concurrency:
  group: sync-catalog
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    name: sync
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Pre-flight FIRST (before checkout): fail loud with a pointer to the
      # runbook if the App secrets are absent. Without this, the workflow
      # would spend a minute checking out + minting a token before failing
      # with an opaque "Bad credentials" from create-github-app-token.
      - name: Verify GitHub App secrets are configured
        env:
          APP_CID: ${{ secrets.KAELYS_CATALOG_APP_CLIENT_ID }}
          APP_PK: ${{ secrets.KAELYS_CATALOG_APP_PRIVATE_KEY }}
        run: |
          if [[ -z "$APP_CID" || -z "$APP_PK" ]]; then
            printf 'Catalog sync is not configured yet.\n'
            printf '\n'
            printf 'One-time setup: see docs/catalog-setup.md\n'
            printf '\n'
            printf 'Missing secrets:\n'
            [[ -z "$APP_CID" ]] && printf '  - KAELYS_CATALOG_APP_CLIENT_ID\n'
            [[ -z "$APP_PK" ]] && printf '  - KAELYS_CATALOG_APP_PRIVATE_KEY\n'
            exit 1
          fi

      # Mint the App token BEFORE checkout so we can pass it into checkout as
      # the git credential. Otherwise checkout stores the default GITHUB_TOKEN
      # (github-actions[bot]) as http.extraheader in .git/config, and the
      # subsequent `git push` inherits that credential regardless of the URL
      # we hand-craft — resulting in 403 "denied to github-actions[bot]".
      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.KAELYS_CATALOG_APP_CLIENT_ID }}
          private-key: ${{ secrets.KAELYS_CATALOG_APP_PRIVATE_KEY }}
          # Cross-repo: the App must read .github/kaelys-catalog.json from
          # each of the three target repos AND write README.md here.
          owner: ${{ github.repository_owner }}
          repositories: |
            kaelys-js
            kaelys-js-infra
            stardust
            foundation-registry
            claude-multiacct

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # Use the App token as the git credential so the subsequent
          # commit+push authenticates as kaelys-js-catalog[bot], not the
          # default github-actions[bot] which lacks contents:write here.
          token: ${{ steps.app-token.outputs.token }}

      - name: Install mise + pinned toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Regenerate README catalog block
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: node scripts/sync-catalog.mjs

      - name: Commit and push if drift
        env:
          # The token from create-github-app-token authenticates as the App
          # bot; committing under that identity keeps the audit trail clean
          # and lets a re-triggered sync see itself as no-op.
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          BOT_NAME: "kaelys-js-catalog[bot]"
          BOT_EMAIL: "kaelys-js-catalog[bot]@users.noreply.github.com"
        run: |
          if [[ -z "$(git status --porcelain -- README.md)" ]]; then
            echo "sync-catalog: README unchanged — nothing to commit."
            exit 0
          fi
          git config user.name "$BOT_NAME"
          git config user.email "$BOT_EMAIL"
          git add README.md
          git commit --signoff --message "chore(catalog): regenerate profile README from cataloged repos"
          # Use the App token to push so any follow-on sync sees a matching
          # committer and won't re-trigger on its own commit.
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
