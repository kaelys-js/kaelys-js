# kaelys-js/kaelys-js CI. Every push + PR:
#   - installs the pinned mise toolchain
#   - runs oxlint + yaml/markdown lint + gitleaks
#   - validates every committed catalog fixture against the schema
#   - runs the node --test suite
#
# The sync-catalog workflow (sync-catalog.yml) is a separate, secrets-gated
# job that only runs on schedule / dispatch / repository_dispatch.
name: CI

"on":
  # Docs-only changes skip real CI here and match ci-noop.yml (mirror path
  # list) which posts required-check successes so branch protection lets
  # docs-only PRs merge without a full CI run. Keep the two lists in sync.
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
      - ".editorconfig"
      - ".gitattributes"
      - ".github/CODEOWNERS"
      - ".github/copilot-instructions.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - "SUPPORT.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
      - ".editorconfig"
      - ".gitattributes"
      - ".github/CODEOWNERS"
      - ".github/copilot-instructions.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - "SUPPORT.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  qa:
    name: lint + schema + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # jdx/mise-action installs mise + every tool pinned in mise.toml
      # (node, pnpm, oxlint, oxfmt, yamllint, yq, markdownlint-cli2, gitleaks).
      - name: Install mise + pinned toolchain
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Full qa lint (oxlint + yamllint + markdown + gitleaks + editorconfig + taplo)
        run: pnpm qa:lint

      - name: Format check (oxfmt + taplo)
        run: pnpm qa:format:check

      # Walks every catalog file we can see — this repo's fixtures + any
      # sibling checkout under --repos-root — and validates against the schema.
      # In CI we only have this repo checked out, so the check hits fixtures.
      - name: Validate every committed catalog file against the schema
        run: pnpm validate:schema

      # Coverage gate: vitest.config.mjs sets perFile thresholds of 90 on
      # lines/functions/branches/statements. The gate is vitest's own exit code.
      - name: Tests + coverage (vitest, ≥90% per file)
        run: pnpm qa:test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-v8
          path: coverage/
          retention-days: 7
