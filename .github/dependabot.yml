---
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2

updates:
  # Track GitHub Actions used in workflows. The mise-managed toolchain
  # (node, pnpm, gitleaks, yamllint, markdownlint-cli2) is pinned in mise.toml
  # and not tracked here — Dependabot doesn't understand mise.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # ajv + ajv-formats — the only runtime deps.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
