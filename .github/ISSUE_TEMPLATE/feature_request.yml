# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json
# Managed by kaelys-js-infra (terraform/repository_files.tf).
name: Feature request
description: Suggest an enhancement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the current pain point?
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about, and why they don't fit.
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
    validations:
      required: false
