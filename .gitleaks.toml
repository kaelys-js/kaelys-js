# Secret-scanning standard for kaelys-js — gitleaks. Extends the built-in
# ruleset rather than replacing it, then narrows false positives.

[extend]
useDefault = true

[[allowlists]]
description = "Lockfiles and vendored assets — integrity hashes, not secrets."
paths = ['''pnpm-lock\.yaml$''', '''mise\.lock$''', '''(^|/)\.mise/''', '''(^|/)node_modules/''']

[[allowlists]]
description = "Obvious non-secret placeholders used in docs and examples."
regexTarget = "match"
regexes = ['''(?i)(example|sample|dummy|placeholder|changeme|your[-_]?(token|key|secret))''']

[[allowlists]]
description = "Test fixture catalog files — hand-authored, never contain live secrets."
paths = ['''(^|/)tests/fixtures/''']
